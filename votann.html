<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leagues of Votann Army Builder</title>
<style>
  :root {
    --bg: #0b0f0a;
    --panel: #11160f;
    --panel2: #161d12;
    --border: #2d3b22;
    --green: #6fdc3a;
    --green-dim: #3a8a1f;
    --text: #d8e6c8;
    --text-dim: #8aa074;
    --gold: #c9a93f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  header {
    padding: 18px 24px;
    border-bottom: 2px solid var(--green-dim);
    background: linear-gradient(180deg, #141a10, #0b0f0a);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
  }
  header .faction-tag {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .points-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
  }
  .points-box label { font-size: 12px; color: var(--text-dim); }
  .points-box input[type=number] {
    width: 70px;
    background: #0b0f0a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 14px;
  }
  .points-total {
    font-size: 18px;
    font-weight: bold;
  }
  .points-total.over { color: #e25a3a; }
  .points-total.ok { color: var(--green); }
  main {
    display: flex;
    gap: 16px;
    padding: 16px;
    align-items: flex-start;
  }
  .col {
    flex: 1;
    min-width: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-header {
    background: var(--panel2);
    padding: 10px 14px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
    border-bottom: 1px solid var(--border);
  }
  .search-bar {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .search-bar input {
    width: 100%;
    padding: 7px 10px;
    background: #0b0f0a;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 13px;
  }
  .category {
    border-bottom: 1px solid var(--border);
  }
  .category-title {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: bold;
    color: var(--green);
    background: #0e1310;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
  }
  .category-title:hover { background: #15200f; }
  .category-body { display: block; }
  .category.collapsed .category-body { display: none; }
  .category-title .arrow { color: var(--text-dim); font-size: 11px; }
  .unit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    border-bottom: 1px solid #1a2215;
    gap: 8px;
    cursor: pointer;
  }
  .unit-row:hover { background: #131a0e; }
  .unit-row:last-child { border-bottom: none; }
  .unit-row.maxed { opacity: 0.45; cursor: default; }
  .unit-row.maxed:hover { background: none; }
  .unit-info { flex: 1; min-width: 0; }
  .unit-name { font-size: 13px; color: var(--text); }
  .unit-sub { font-size: 11px; color: var(--text-dim); }
  .unit-pts { font-size: 12px; color: var(--gold); white-space: nowrap; }
  .unit-count {
    font-size: 11px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    white-space: nowrap;
  }
  .unit-count.full { color: #e25a3a; border-color: #5a1f1f; }
  .army-list { min-height: 200px; }
  .army-empty {
    padding: 30px 14px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }
  .army-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid #1a2215;
    gap: 8px;
  }
  .army-row .unit-info { flex: 1; }
  .army-row .cat-badge {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .remove-btn {
    background: #3a1414;
    color: #e0a0a0;
    border: none;
    border-radius: 4px;
    width: 26px;
    height: 26px;
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
  }
  .remove-btn:hover { background: #5a1f1f; }
  .wargear-btn {
    background: #1a2b14;
    color: var(--green);
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    width: 26px;
    height: 26px;
    font-size: 13px;
    cursor: pointer;
    line-height: 1;
  }
  .wargear-btn:hover { background: #233a1a; }
  .army-footer {
    padding: 14px;
    border-top: 2px solid var(--border);
    background: var(--panel2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .army-footer .label { font-size: 13px; color: var(--text-dim); }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .clear-btn:hover { color: #e0a0a0; border-color: #5a1f1f; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .scroll { max-height: 640px; overflow-y: auto; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--green-dim);
    border-radius: 8px;
    width: 560px;
    max-width: 92vw;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .modal-body { overflow-y: auto; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .stat-cell {
    background: #0b0f0a;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-align: center;
    padding: 6px 2px;
  }
  .stat-cell .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
  .stat-cell .stat-value { font-size: 15px; color: var(--green); font-weight: bold; }
  .keyword-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    font-size: 10px;
    color: var(--gold);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .section-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 14px 0 6px;
  }
  .ability-item { margin-bottom: 8px; }
  .ability-item .ability-name { font-size: 12px; color: var(--text); font-weight: bold; }
  .ability-item .ability-text { font-size: 11px; color: var(--text-dim); line-height: 1.4; white-space: pre-line; }
  .weapon-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 6px; }
  .weapon-table th, .weapon-table td { border: 1px solid var(--border); padding: 4px 6px; text-align: center; }
  .weapon-table th { background: #0e1310; color: var(--gold); font-size: 10px; text-transform: uppercase; }
  .weapon-table td:first-child, .weapon-table th:first-child { text-align: left; color: var(--text); }
  .weapon-table td { color: var(--text-dim); }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel2);
    border-radius: 8px 8px 0 0;
  }
  .modal-header h2 {
    margin: 0;
    font-size: 16px;
    color: var(--green);
  }
  .modal-header .modal-cat { font-size: 11px; color: var(--gold); text-transform: uppercase; }
  .modal-body { padding: 16px 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-field select {
    width: 100%;
    padding: 8px;
    background: #0b0f0a;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 13px;
  }
  .modal-price {
    font-size: 22px;
    color: var(--gold);
    font-weight: bold;
  }
  .modal-note {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .modal-warn {
    font-size: 12px;
    color: #e25a3a;
    margin-top: 8px;
  }
  .modal-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }
  .btn:hover { color: var(--text); }
  .btn-primary {
    background: var(--green-dim);
    border-color: var(--green-dim);
    color: #0b0f0a;
    font-weight: bold;
  }
  .btn-primary:hover { background: var(--green); }
  .btn-primary:disabled {
    background: #2d3b22;
    color: #6a7a5e;
    cursor: not-allowed;
  }

  .toolbar {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  .toolbar .tb-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .toolbar select {
    background: #0b0f0a; border: 1px solid var(--border); color: var(--text);
    padding: 6px 8px; border-radius: 4px; font-size: 13px;
  }
  .toolbar .spacer { flex: 1; }
  .det-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .det-chip {
    display: inline-flex; align-items: center; gap: 7px; background: var(--panel2);
    border: 1px solid var(--green-dim); border-radius: 14px; padding: 3px 10px; font-size: 12px; color: var(--text);
  }
  .det-chip .dp { color: var(--gold); font-weight: bold; }
  .det-chip .disp { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .det-chip .uni { color: #b07fd0; font-size: 10px; text-transform: uppercase; }
  .det-chip .x { cursor: pointer; color: var(--text-dim); font-weight: bold; }
  .det-chip .x:hover { color: #e25a3a; }
  .dp-readout { font-size: 12px; color: var(--text-dim); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; white-space: nowrap; }
  .dp-readout.over { color: #e25a3a; border-color: #5a1f1f; }
  .det-warn { color: #e25a3a; font-size: 12px; padding: 0 16px; min-height: 0; }
  .det-warn:not(:empty) { padding: 8px 16px; }
  .tb-btn {
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  .tb-btn:hover { border-color: var(--green-dim); color: var(--green); }
  .tb-btn:disabled { cursor: default; }
  .enh-badge {
    display: inline-block; margin-top: 4px; font-size: 11px; color: #0b0f0a;
    background: var(--gold); padding: 1px 6px; border-radius: 3px;
  }
  .enh-badge.upg { background: #b07fd0; }
  .enh-btn {
    background: #2a230d; border: 1px solid var(--gold); color: var(--gold);
    border-radius: 4px; cursor: pointer; font-size: 13px; width: 26px; height: 26px; flex: none;
  }
  .enh-btn:hover { background: #3a3010; }
  .attach-btn {
    background: #161d12; border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 4px; cursor: pointer; font-size: 11px; padding: 2px 8px; flex: none; white-space: nowrap;
  }
  .attach-btn:hover { border-color: var(--green-dim); color: var(--green); }
  .army-row.attached { margin-left: 22px; border-left: 2px solid var(--green-dim); background: #0e140a; }
  .attached-tag { font-size: 10px; color: var(--green-dim); text-transform: uppercase; letter-spacing: 1px; }
  .lists-row {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .text-input {
    width: 100%; background: #0b0f0a; border: 1px solid var(--border); color: var(--text);
    padding: 8px; border-radius: 4px; font-size: 13px;
  }
  .code-area {
    width: 100%; height: 90px; background: #0b0f0a; border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; font-family: monospace; font-size: 11px; padding: 8px; resize: vertical;
  }
  .army-row .unit-info { cursor: pointer; }
  .army-row .unit-info:hover .unit-name { color: var(--green); text-decoration: underline; }
  .ds-mod { color: var(--green); font-weight: bold; }
  .ds-ctx { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; line-height: 1.5; }
  .ds-section-note { font-size: 11px; color: var(--gold); margin: 8px 0; line-height: 1.4; }
  .ds-member { border-top: 1px solid var(--border); margin-top: 16px; padding-top: 14px; }
  .ds-member:first-of-type { border-top: none; margin-top: 0; padding-top: 0; }
  .ds-member-name { font-size: 15px; color: var(--green); font-weight: bold; margin-bottom: 10px; letter-spacing: 0.5px; }
  @media (max-width: 760px) {
    header { padding: 14px 14px; gap: 10px; }
    header h1 { font-size: 18px; letter-spacing: 1px; }
    .points-box { width: 100%; justify-content: space-between; }
    .toolbar { padding: 10px 12px; gap: 8px; }
    .toolbar select { min-width: 0; flex: 1 1 100%; }
    .toolbar .spacer { display: none; }
    .det-list { width: 100%; }
    .dp-readout { flex: 1 1 auto; text-align: center; }
    main { flex-direction: column; padding: 12px; gap: 12px; align-items: stretch; }
    .col { width: 100%; flex: none; min-width: 0; }
    .scroll { max-height: 56vh; }
    .modal { width: 96vw; max-width: 96vw; max-height: 90vh; }
    .modal-body { padding: 12px 14px; overflow-x: auto; }
    .weapon-table { font-size: 9px; }
    .weapon-table th, .weapon-table td { padding: 3px 3px; }
    .stat-grid { gap: 4px; }
    .unit-row, .army-row { padding: 10px 8px; }
    .remove-btn, .wargear-btn, .enh-btn { width: 30px; height: 30px; }
    .attach-btn { padding: 4px 8px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>40K Pts on the Cheap</h1>
    <a class="back-link" href="index.html" style="font-size:11px;color:#8aa074;text-decoration:none;">&larr; Choose a different faction</a>
    <div class="faction-tag">FACTION: LEAGUES OF VOTANN</div>
  </div>
  <div class="points-box">
    <label>Points limit</label>
    <input type="number" id="pointsLimit" value="2000" min="0" step="5">
    <div class="points-total ok" id="totalDisplay">0 / 2000</div>
  </div>
</header>

<div class="toolbar">
  <span class="tb-label">Detachments</span>
  <div id="detList" class="det-list"></div>
  <select id="detAdd"></select>
  <span class="dp-readout" id="dpReadout">DP 0 / 3</span>
  <span class="spacer"></span>
  <span class="tb-label" id="listNameTag"></span>
  <button class="tb-btn" id="listsBtn">Saved lists</button>
  <button class="tb-btn" id="shareBtn">Share / Import</button>
</div>
<div class="det-warn" id="detWarn"></div>

<main>
  <div class="col">
    <div class="panel">
      <div class="panel-header">Available Units</div>
      <div class="search-bar"><input type="text" id="searchInput" placeholder="Search units..."></div>
      <div class="scroll" id="unitList"></div>
    </div>
  </div>

  <div class="col">
    <div class="panel">
      <div class="panel-header">Your Army List</div>
      <div class="scroll army-list" id="armyList">
        <div class="army-empty">No units added yet. Click a unit to add it.</div>
      </div>
      <div class="army-footer">
        <span class="label" id="unitCount">0 units</span>
        <button class="clear-btn" id="clearBtn">Clear army</button>
      </div>
    </div>
  </div>
</main>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-cat" id="modalCat"></div>
      <h2 id="modalName"></h2>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalAdd">Add to Army</button>
    </div>
  </div>
</div>


<div class="overlay hidden" id="listsOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-cat">Saved Army Lists</div>
      <h2>Your lists (saved in this browser)</h2>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Save current army as</label>
        <input type="text" id="listNameInput" class="text-input" placeholder="e.g. Hypercrypt 2000pts">
      </div>
      <div id="listsContainer"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="listsClose">Close</button>
      <button class="btn btn-primary" id="listsSave">Save current</button>
    </div>
  </div>
</div>

<div class="overlay hidden" id="shareOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-cat">Share &amp; Import</div>
      <h2>Army code</h2>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Your army code &mdash; copy and send it to anyone</label>
        <textarea class="code-area" id="exportCode" readonly></textarea>
      </div>
      <button class="tb-btn" id="copyCodeBtn">Copy code</button>
      <div class="modal-field" style="margin-top:16px;">
        <label>Paste a code to load someone's army</label>
        <textarea class="code-area" id="importCode" placeholder="Paste army code here"></textarea>
      </div>
      <div class="modal-warn" id="importWarn"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="shareClose">Close</button>
      <button class="btn btn-primary" id="importBtn">Import code</button>
    </div>
  </div>
</div>

const CATEGORY_ORDER = ["Characters", "Battleline", "Infantry", "Mounted", "Vehicles"];
const MAX_COPIES = 3;

let army = [];          // { id, unitName, category, models, points, copyIndex }
let nextId = 1;
let activeUnit = null;  // unit currently open in modal

function countInArmy(unitName) {
  return army.filter(a => a.unitName === unitName).length;
}

function maxAllowed(unit) {
  return unit.epicHero ? 1 : MAX_COPIES;
}

function priceFor(size, copyIndexZeroBased) {
  // copyIndexZeroBased: 0 = first copy already in army count before this add
  if (size.flat !== null && size.flat !== undefined) return size.flat;
  return copyIndexZeroBased < 2 ? size.p1_2 : size.p3;
}

function unitPriceRangeLabel(unit) {
  const prices = [];
  unit.sizes.forEach(s => {
    if (s.flat !== null && s.flat !== undefined) prices.push(s.flat);
    if (s.p1_2 !== null && s.p1_2 !== undefined) prices.push(s.p1_2);
  });
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  return min === max ? (min + ' pts') : (min + '\u2013' + max + ' pts');
}

function groupByCategory(list) {
  const groups = {};
  list.forEach(u => {
    if (!groups[u.category]) groups[u.category] = [];
    groups[u.category].push(u);
  });
  return groups;
}

function renderUnitList(filterText) {
  const container = document.getElementById('unitList');
  container.innerHTML = "";
  const filtered = filterText
    ? UNITS.filter(u => u.name.toLowerCase().includes(filterText.toLowerCase()))
    : UNITS;
  const groups = groupByCategory(filtered);
  CATEGORY_ORDER.forEach(cat => {
    if (!groups[cat] || groups[cat].length === 0) return;
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    const title = document.createElement('div');
    title.className = 'category-title';
    title.innerHTML = '<span>' + cat + ' (' + groups[cat].length + ')</span><span class="arrow">\u25be</span>';
    title.onclick = () => {
      catDiv.classList.toggle('collapsed');
      title.querySelector('.arrow').textContent = catDiv.classList.contains('collapsed') ? '\u25b8' : '\u25be';
    };
    const body = document.createElement('div');
    body.className = 'category-body';
    groups[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(u => {
      const have = countInArmy(u.name);
      const max = maxAllowed(u);
      const maxed = have >= max;
      const row = document.createElement('div');
      row.className = 'unit-row' + (maxed ? ' maxed' : '');
      row.innerHTML = `
        <div class="unit-info">
          <div class="unit-name">${u.name}${u.epicHero ? ' \u2605' : ''}</div>
          <div class="unit-sub">${unitPriceRangeLabel(u)}</div>
        </div>
        <div class="unit-count ${maxed ? 'full' : ''}">${have}/${max}</div>
      `;
      if (!maxed) row.onclick = () => openModal(u);
      body.appendChild(row);
    });
    catDiv.appendChild(title);
    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });
}

function statGrid(stats) {
  const order = ['M','T','SV','W','LD','OC'];
  const cells = order.filter(k => stats[k]).map(k =>
    `<div class="stat-cell"><div class="stat-label">${k}</div><div class="stat-value">${stats[k]}</div></div>`
  ).join('');
  return `<div class="stat-grid">${cells}</div>`;
}

function keywordChips(keywords) {
  if (!keywords || keywords.length === 0) return '';
  return '<div class="keyword-chips">' + keywords.map(k => `<span class="chip">${k}</span>`).join('') + '</div>';
}

function abilitiesBlock(abilities) {
  if (!abilities || abilities.length === 0) return '';
  const items = abilities.map(a =>
    `<div class="ability-item"><div class="ability-name">${a.name}</div><div class="ability-text">${a.text}</div></div>`
  ).join('');
  return `<div class="section-title">Abilities</div>${items}`;
}

function weaponTable(title, weapons, melee) {
  if (!weapons || weapons.length === 0) return '';
  const skillCol = melee ? 'WS' : 'BS';
  const rows = weapons.map(w => `
    <tr>
      <td>${w.name}</td>
      <td>${w.Range || '-'}</td>
      <td>${w.A || '-'}</td>
      <td>${w[skillCol] || '-'}</td>
      <td>${w.S || '-'}</td>
      <td>${w.AP || '-'}</td>
      <td>${w.D || '-'}</td>
      <td>${(w.Keywords && w.Keywords !== '-') ? w.Keywords : '\u2013'}</td>
    </tr>`).join('');
  return `
    <div class="section-title">${title}</div>
    <table class="weapon-table">
      <thead><tr><th>Weapon</th><th>Range</th><th>A</th><th>${skillCol}</th><th>S</th><th>AP</th><th>D</th><th>Keywords</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function openModal(unit) {
  activeUnit = unit;
  document.getElementById('modalCat').textContent = unit.category + (unit.epicHero ? ' \u00b7 Epic Hero (max 1)' : ' \u00b7 max 3 per army');
  document.getElementById('modalName').textContent = unit.name;
  const body = document.getElementById('modalBody');
  body.innerHTML = "";

  const ds = unit.datasheet;
  if (ds) {
    const dsWrap = document.createElement('div');
    dsWrap.innerHTML =
      statGrid(ds.stats || {}) +
      keywordChips(ds.keywords) +
      abilitiesBlock(ds.abilities) +
      weaponTable('Ranged Weapons', ds.rangedWeapons, false) +
      weaponTable('Melee Weapons', ds.meleeWeapons, true);
    body.appendChild(dsWrap);
  }

  const have = countInArmy(unit.name);
  const copyIndex = have; // 0-based index of the copy about to be added

  let sizeSelect = null;
  if (unit.sizes.length > 1) {
    const field = document.createElement('div');
    field.className = 'modal-field';
    field.innerHTML = '<label>Unit size</label>';
    sizeSelect = document.createElement('select');
    unit.sizes.forEach((s, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = s.models + (s.models === '1' ? ' model' : ' models');
      sizeSelect.appendChild(opt);
    });
    field.appendChild(sizeSelect);
    body.appendChild(field);
  }

  const priceField = document.createElement('div');
  priceField.className = 'modal-field';
  priceField.innerHTML = '<label>Cost</label><div class="modal-price" id="modalPrice"></div><div class="modal-note" id="modalNote"></div>';
  body.appendChild(priceField);

  function updatePrice() {
    const sizeIdx = sizeSelect ? parseInt(sizeSelect.value) : 0;
    const size = unit.sizes[sizeIdx];
    const price = priceFor(size, copyIndex);
    document.getElementById('modalPrice').textContent = price + ' pts';
    const note = document.getElementById('modalNote');
    if (size.flat === null || size.flat === undefined) {
      note.textContent = copyIndex < 2
        ? 'Price for the 1st or 2nd copy of this unit in your army.'
        : 'Price increases for the 3rd copy of this unit in your army.';
    } else {
      note.textContent = '';
    }
  }
  if (sizeSelect) sizeSelect.onchange = updatePrice;
  updatePrice();

  const warn = document.createElement('div');
  warn.className = 'modal-warn';
  warn.id = 'modalWarn';
  if (have > 0) {
    warn.textContent = 'You already have ' + have + ' of this unit in your army.';
  }
  body.appendChild(warn);

  document.getElementById('modalAdd').textContent = 'Add to Army';
  document.getElementById('modalAdd').onclick = () => {
    const sizeIdx = sizeSelect ? parseInt(sizeSelect.value) : 0;
    const size = unit.sizes[sizeIdx];
    const price = priceFor(size, copyIndex);
    army.push({
      id: nextId++,
      unitName: unit.name,
      category: unit.category,
      models: size.models,
      basePoints: price,
      points: price,
      wargear: [],
    });
    closeModal();
    renderUnitList(document.getElementById('searchInput').value);
    renderArmy();
  };

  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  activeUnit = null;
}

function openWargearModal(entry) {
  const unit = UNITS.find(u => u.name === entry.unitName);
  if (!unit || !unit.wargear || unit.wargear.length === 0) return;
  document.getElementById('modalCat').textContent = 'Wargear Options';
  document.getElementById('modalName').textContent = entry.unitName;
  const body = document.getElementById('modalBody');
  body.innerHTML = "";

  const note = document.createElement('div');
  note.className = 'modal-note';
  note.textContent = 'Choose optional wargear for this unit.';
  body.appendChild(note);

  const wgInputs = [];
  unit.wargear.forEach((wg) => {
    const existing = (entry.wargear || []).find(w => w.name === wg.name);
    const row = document.createElement('div');
    row.className = 'wargear-row';
    row.style.display = 'flex';
    row.style.alignItems = 'center';
    row.style.justifyContent = 'space-between';
    row.style.gap = '10px';
    row.style.margin = '10px 0';
    const label = document.createElement('span');
    label.textContent = wg.name + ' (+' + wg.cost + ' pts each)';
    const input = document.createElement('input');
    input.type = 'number';
    input.min = '0';
    input.value = existing ? existing.qty : 0;
    input.style.width = '60px';
    row.appendChild(label);
    row.appendChild(input);
    body.appendChild(row);
    wgInputs.push(input);
  });

  const priceField = document.createElement('div');
  priceField.className = 'modal-field';
  priceField.innerHTML = '<label>Total Cost</label><div class="modal-price" id="modalPrice"></div>';
  body.appendChild(priceField);

  function updateWgPrice() {
    let sum = 0;
    wgInputs.forEach((inp, i) => { sum += Math.max(0, parseInt(inp.value) || 0) * unit.wargear[i].cost; });
    document.getElementById('modalPrice').textContent = (entry.basePoints + sum) + ' pts';
  }
  wgInputs.forEach(inp => inp.addEventListener('input', updateWgPrice));
  updateWgPrice();

  const warn = document.createElement('div');
  warn.className = 'modal-warn';
  warn.id = 'modalWarn';
  body.appendChild(warn);

  document.getElementById('modalAdd').textContent = 'Save Wargear';
  document.getElementById('modalAdd').onclick = () => {
    const chosen = unit.wargear.map((wg, i) => ({
      name: wg.name,
      qty: Math.max(0, parseInt(wgInputs[i].value) || 0),
      cost: wg.cost,
    })).filter(w => w.qty > 0);
    const wgSum = chosen.reduce((s, w) => s + w.qty * w.cost, 0);
    entry.wargear = chosen;
    entry.points = entry.basePoints + wgSum;
    document.getElementById('modalAdd').textContent = 'Add to Army';
    closeModal();
    renderArmy();
  };

  document.getElementById('overlay').classList.remove('hidden');
}

function removeFromArmy(id) {
  army = army.filter(a => a.id !== id);
  renderArmy();
  renderUnitList(document.getElementById('searchInput').value);
}

function renderArmy() {
  const container = document.getElementById('armyList');
  const countEl = document.getElementById('unitCount');
  if (army.length === 0) {
    container.innerHTML = '<div class="army-empty">No units added yet. Click a unit to add it.</div>';
  } else {
    container.innerHTML = "";
    army.forEach(a => {
      const row = document.createElement('div');
      row.className = 'army-row';
      const unitDef = UNITS.find(u => u.name === a.unitName);
      const hasWargear = unitDef && unitDef.wargear && unitDef.wargear.length > 0;
      const wgLine = (a.wargear && a.wargear.length > 0)
        ? '<div class="cat-badge">' + a.wargear.map(w => '+' + w.qty + ' ' + w.name).join(', ') + '</div>'
        : '';
      row.innerHTML = `
        <div class="unit-info">
          <div class="unit-name">${a.unitName}</div>
          <div class="cat-badge">${a.category} \u00b7 ${a.models} ${a.models === '1' ? 'model' : 'models'}</div>
          ${wgLine}
        </div>
        <div class="unit-pts">${a.points} pts</div>
        ${hasWargear ? '<button class="wargear-btn" title="Wargear options">\u2699</button>' : ''}

      row.querySelector('.remove-btn').onclick = () => removeFromArmy(a.id);
      container.appendChild(row);
    });
  }
  countEl.textContent = army.length + (army.length === 1 ? ' unit' : ' units');
  updateTotal();
}

function updateTotal() {
  const total = army.reduce((sum, a) => sum + a.points, 0);
  const limit = parseInt(document.getElementById('pointsLimit').value) || 0;
  const totalEl = document.getElementById('totalDisplay');
  totalEl.textContent = total + ' / ' + limit;
  totalEl.className = 'points-total ' + (total > limit ? 'over' : 'ok');
}

/* ---- detachment helpers -------------------------------------------- */
function getDet(name){ return DETACHMENTS.find(d => d.name === name); }
function selectedDets(){ return detachments.map(getDet).filter(Boolean); }
function dpUsed(){ return selectedDets().reduce((s, d) => s + d.dp, 0); }
function dpBudget(){ return (parseInt(document.getElementById('pointsLimit').value) || 0) >= 2000 ? 3 : 2; }
function enhLimit(){ return (parseInt(document.getElementById('pointsLimit').value) || 0) >= 2000 ? 4 : 2; }
function enhPool(){
  const map = {};
  selectedDets().forEach(d => d.enh.forEach(e => { if(!map[e.name]) map[e.name] = {name:e.name, cost:e.cost, upgrade:!!e.upgrade, elig:e.elig, nochar:!!e.nochar}; }));
  return Object.values(map);
}
// --- enhancement eligibility (which units may take which enhancement/upgrade) ---
function normTok(s){ return String(s).toLowerCase().replace(/’/g, "'").replace(/‑/g, '-'); }
function unitHasKeyword(unitDef, tok){
  return (unitDef.datasheet.keywords||[]).some(k => normTok(k) === normTok(tok));
}
function unitNameHas(unitDef, tok){ return normTok(unitDef.name).indexOf(normTok(tok)) !== -1; }
var FACTION_WIDE_TOKENS = ['NECRONS', 'ANY'];   // tokens meaning "any unit in this faction"
function matchToken(unitDef, tok){
  if(Array.isArray(tok)) return tok.every(t => unitHasKeyword(unitDef, t));   // compound: all keywords
  if(FACTION_WIDE_TOKENS.indexOf(String(tok).toUpperCase()) !== -1) return true;
  return unitHasKeyword(unitDef, tok) || unitNameHas(unitDef, tok);
}
function matchTokenByName(unitDef, tok){
  if(Array.isArray(tok) || FACTION_WIDE_TOKENS.indexOf(String(tok).toUpperCase()) !== -1) return false;
  return unitNameHas(unitDef, tok);
}
// True Epic Hero = has the "Epic Hero" keyword (the datasheet's epicHero flag also marks
// unique non-Epic-Hero models like the Hexmark Destroyer, which CAN take enhancements).
function isEpicHero(entry){
  const u = unitDefOf(entry);
  return !!(u && u.datasheet && (u.datasheet.keywords||[]).map(k => k.toLowerCase()).includes('epic hero'));
}
function unitEligibleForEnh(entry, enh){
  const u = unitDefOf(entry);
  if(!u) return false;
  if(enh.elig){
    const toks = enh.elig;
    if(enh.upgrade) return !isCharacter(entry) && toks.some(t => matchToken(u, t));   // upgrades: named non-Character units
    if(!enh.nochar && !isCharacter(entry)) return false;                              // enhancements: Characters only (unless nochar)
    if(isEpicHero(entry)) return toks.some(t => matchTokenByName(u, t));              // Epic Heroes only if named explicitly
    return toks.some(t => matchToken(u, t));
  }
  // Fallback for detachments without eligibility data
  if(enh.upgrade) return !isCharacter(entry);
  return isCharacter(entry) && !isEpicHero(entry);
}
function distinctEnhNames(exceptId){
  const s = new Set();
  army.forEach(e => { if(e.enhancement && e.id !== exceptId) s.add(e.enhancement.name); });
  return s;
}
function pruneEnhancements(){
  const names = new Set(enhPool().map(e => e.name));
  army.forEach(e => { if(e.enhancement && !names.has(e.enhancement.name)) e.enhancement = null; });
}
function setWarn(msg){
  const w = document.getElementById('detWarn');
  w.textContent = msg || '';
  if(msg) setTimeout(() => { if(w.textContent === msg) w.textContent = ''; }, 4500);
}
function addDetachment(name){
  if(!name || detachments.includes(name)) return;
  const cand = getDet(name); if(!cand) return;
  const cur = selectedDets();
  if(cand.dp === 3 && cur.length > 0){ setWarn('A 3 DP detachment must be taken on its own.'); return; }
  if(cur.some(d => d.dp === 3)){ setWarn('You already have a 3 DP detachment, which must be fielded alone.'); return; }
  if(cand.unique && cur.some(d => d.unique === cand.unique)){
    setWarn('You cannot combine two detachments that share the keyword: ' + cand.unique + '.'); return;
  }
  detachments.push(name);
  setWarn('');
  pruneEnhancements();
  renderDetachments(); renderArmy();
}
function removeDetachment(name){
  detachments = detachments.filter(n => n !== name);
  pruneEnhancements();
  renderDetachments(); renderArmy();
}
function renderDetachments(){
  const list = document.getElementById('detList');
  list.innerHTML = '';
  selectedDets().forEach(d => {
    const chip = document.createElement('span');
    chip.className = 'det-chip';
    chip.innerHTML = '<span>' + d.name + '</span>' +
      '<span class="dp">' + d.dp + 'DP</span>' +
      '<span class="disp">' + d.disp + '</span>' +
      (d.unique ? '<span class="uni">' + d.unique + '</span>' : '') +
      '<span class="x" title="Remove">✕</span>';
    chip.querySelector('.x').onclick = () => removeDetachment(d.name);
    list.appendChild(chip);
  });
  const sel = document.getElementById('detAdd');
  const avail = DETACHMENTS.filter(d => !detachments.includes(d.name));
  sel.innerHTML = '<option value="">+ Add detachment…</option>' +
    avail.map(d => '<option value="' + d.name + '">' + d.name + '  (' + d.dp + 'DP · ' + d.disp + (d.unique ? (' · ' + d.unique) : '') + ')</option>').join('');
  const used = dpUsed(), budget = dpBudget();
  const ro = document.getElementById('dpReadout');
  ro.textContent = 'DP ' + used + ' / ' + budget;
  ro.className = 'dp-readout' + (used > budget ? ' over' : '');
}

/* ---- unit / character helpers -------------------------------------- */
function unitDefOf(entry){ return UNITS.find(u => u.name === entry.unitName); }
function isCharacter(entry){
  const u = unitDefOf(entry);
  return !!(u && u.datasheet && (u.datasheet.keywords||[]).map(k=>k.toLowerCase()).includes('character'));
}
function parseLeaderTargets(unit){
  if(!unit || !unit.datasheet) return [];
  const ab = (unit.datasheet.abilities||[]).find(a => a.name.toLowerCase() === 'leader');
  if(!ab) return [];
  const up = ab.text.toUpperCase();
  const out = [];
  UNITS.forEach(u => { if(up.includes(u.name.toUpperCase())) out.push(u.name); });
  return out;
}
function leaderTargetsFor(entry){
  if(!entry.leaderTargets) entry.leaderTargets = parseLeaderTargets(unitDefOf(entry));
  return entry.leaderTargets;
}
function isLeaderEntry(entry){ return leaderTargetsFor(entry).length > 0; }
function eligibleBodyguards(leader){
  const tg = leaderTargetsFor(leader);
  return army.filter(e => e.id !== leader.id && tg.includes(e.unitName));
}

/* ---- army rendering ------------------------------------------------- */
function canTakeEnhancement(entry){
  if(detachments.length === 0) return false;
  return enhPool().some(e => unitEligibleForEnh(entry, e));
}
function buildArmyRow(a, attached){
  const row = document.createElement('div');
  row.className = 'army-row' + (attached ? ' attached' : '');
  const unitDef = unitDefOf(a);
  const hasWargear = unitDef && unitDef.wargear && unitDef.wargear.length > 0;
  const wgLine = (a.wargear && a.wargear.length > 0)
    ? '<div class="cat-badge">' + a.wargear.map(w => '+' + w.qty + ' ' + w.name).join(', ') + '</div>' : '';
  const enhLine = a.enhancement
    ? '<div class="enh-badge' + (a.enhancement.upgrade ? ' upg' : '') + '">★ ' + a.enhancement.name + ' (+' + a.enhancement.cost + ')</div>' : '';
  const canEnh = canTakeEnhancement(a);
  const isLead = isLeaderEntry(a);
  const ptsTotal = a.points + (a.enhancement ? a.enhancement.cost : 0);
  const tag = attached ? '<span class="attached-tag">▸ leading</span> ' : '';
  row.innerHTML =
    '<div class="unit-info">' +
      '<div class="unit-name">' + tag + a.unitName + '</div>' +
      '<div class="cat-badge">' + a.category + ' · ' + a.models + ' ' + (a.models === '1' ? 'model' : 'models') + '</div>' +
      wgLine + enhLine +
    '</div>' +
    '<div class="unit-pts">' + ptsTotal + ' pts</div>' +
    (isLead ? '<button class="attach-btn" title="Attach to a unit">' + (a.attachedTo ? 'Leading ▾' : 'Lead ▾') + '</button>' : '') +
    (canEnh ? '<button class="enh-btn" title="Enhancement">★</button>' : '') +
    (hasWargear ? '<button class="wargear-btn" title="Wargear options">⚙</button>' : '') +
    '<button class="remove-btn" title="Remove">✕</button>';
  const info = row.querySelector('.unit-info');
  if(info){ info.title = 'View datasheet'; info.onclick = () => openDatasheet(a); }
  if(hasWargear) row.querySelector('.wargear-btn').onclick = () => openWargearModal(a);
  if(canEnh){ const b = row.querySelector('.enh-btn'); if(b) b.onclick = () => openEnhancementModal(a); }
  if(isLead){ const b = row.querySelector('.attach-btn'); if(b) b.onclick = () => openAttachModal(a); }
  row.querySelector('.remove-btn').onclick = () => removeFromArmy(a.id);
  return row;
}
function renderArmy(){
  const container = document.getElementById('armyList');
  const countEl = document.getElementById('unitCount');
  army.forEach(e => { if(e.attachedTo && !army.find(b => b.id === e.attachedTo)) e.attachedTo = null; });
  if(army.length === 0){
    container.innerHTML = '<div class="army-empty">No units added yet. Click a unit to add it.</div>';
  } else {
    container.innerHTML = '';
    const byHost = {};
    army.forEach(e => { if(e.attachedTo){ (byHost[e.attachedTo] = byHost[e.attachedTo] || []).push(e); } });
    army.forEach(a => {
      if(a.attachedTo) return;
      container.appendChild(buildArmyRow(a, false));
      (byHost[a.id] || []).forEach(lead => container.appendChild(buildArmyRow(lead, true)));
    });
  }
  countEl.textContent = army.length + (army.length === 1 ? ' unit' : ' units');
  const tag = document.getElementById('listNameTag');
  if(tag) tag.textContent = curListName && curListName !== 'Untitled' ? ('List: ' + curListName) : '';
  updateTotal();
  saveCurrent();
}
function updateTotal(){
  const total = army.reduce((s, a) => s + a.points + (a.enhancement ? a.enhancement.cost : 0), 0);
  const limit = parseInt(document.getElementById('pointsLimit').value) || 0;
  const el = document.getElementById('totalDisplay');
  el.textContent = total + ' / ' + limit;
  el.className = 'points-total ' + (total > limit ? 'over' : 'ok');
}
function removeFromArmy(id){
  army = army.filter(a => a.id !== id);
  army.forEach(e => { if(e.attachedTo === id) e.attachedTo = null; });
  renderArmy();
  renderUnitList(document.getElementById('searchInput').value);
}
function closeModal(){
  document.getElementById('overlay').classList.add('hidden');
  const add = document.getElementById('modalAdd');
  add.style.display = '';
  add.textContent = 'Add to Army';
  activeUnit = null;
}

/* ---- attachment modal ---------------------------------------------- */
function openAttachModal(leader){
  const targets = eligibleBodyguards(leader);
  document.getElementById('modalCat').textContent = 'Attach Leader';
  document.getElementById('modalName').textContent = leader.unitName;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  const note = document.createElement('div');
  note.className = 'modal-note';
  note.textContent = targets.length
    ? 'Choose a unit for this character to lead:'
    : 'No eligible units are in your army yet. Add one of: ' + leaderTargetsFor(leader).join(', ') + '.';
  body.appendChild(note);
  targets.forEach(t => {
    const b = document.createElement('button');
    b.className = 'tb-btn';
    b.style.cssText = 'display:block;width:100%;text-align:left;margin:6px 0;';
    const ledBy = army.find(x => x.attachedTo === t.id && x.id !== leader.id);
    let label = t.unitName;
    if(leader.attachedTo === t.id) label = '✓ ' + label;
    if(ledBy) label += '  (already led by ' + ledBy.unitName + ')';
    b.textContent = label;
    b.onclick = () => { leader.attachedTo = t.id; closeModal(); renderArmy(); };
    body.appendChild(b);
  });
  if(leader.attachedTo){
    const d = document.createElement('button');
    d.className = 'tb-btn';
    d.style.cssText = 'display:block;width:100%;margin:12px 0 0;';
    d.textContent = 'Detach (make independent)';
    d.onclick = () => { leader.attachedTo = null; closeModal(); renderArmy(); };
    body.appendChild(d);
  }
  document.getElementById('modalAdd').style.display = 'none';
  document.getElementById('overlay').classList.remove('hidden');
}

/* ---- enhancement modal --------------------------------------------- */
function openEnhancementModal(entry){
  if(detachments.length === 0){ alert('Add a detachment first.'); return; }
  const opts = enhPool().filter(e => unitEligibleForEnh(entry, e));
  const onlyUpgrades = opts.length > 0 && opts.every(e => e.upgrade);
  document.getElementById('modalCat').textContent = onlyUpgrades ? 'Upgrade' : 'Enhancement';
  document.getElementById('modalName').textContent = entry.unitName;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  const note = document.createElement('div');
  note.className = 'modal-note';
  note.textContent = 'Enhancement limit for this battle size: ' + enhLimit() +
    '. ' + (onlyUpgrades ? 'Upgrades go on the eligible non-Character unit.' : 'One per Character; each enhancement used once.') +
    ' Only options this unit is eligible for are shown.';
  body.appendChild(note);
  const usedByOthers = distinctEnhNames(entry.id);
  opts.forEach(enh => {
    const selected = entry.enhancement && entry.enhancement.name === enh.name;
    const takenUnique = !enh.upgrade && usedByOthers.has(enh.name);
    const b = document.createElement('button');
    b.className = 'tb-btn';
    b.style.cssText = 'display:block;width:100%;text-align:left;margin:6px 0;';
    b.textContent = (selected ? '✓ ' : '') + enh.name + '  (+' + enh.cost + ' pts)' +
      (enh.upgrade ? '  [Upgrade]' : '') + (takenUnique ? '  — in use' : '');
    if(takenUnique){ b.disabled = true; b.style.opacity = 0.45; }
    b.onclick = () => {
      if(selected){ entry.enhancement = null; closeModal(); renderArmy(); return; }
      const names = distinctEnhNames(entry.id);
      const willAddName = !names.has(enh.name);
      if(willAddName && names.size >= enhLimit()){ alert('Enhancement limit for this battle size is ' + enhLimit() + '.'); return; }
      entry.enhancement = { name: enh.name, cost: enh.cost, upgrade: !!enh.upgrade };
      closeModal(); renderArmy();
    };
    body.appendChild(b);
  });
  if(entry.enhancement){
    const d = document.createElement('button');
    d.className = 'tb-btn';
    d.style.cssText = 'display:block;width:100%;margin:12px 0 0;';
    d.textContent = 'Remove enhancement';
    d.onclick = () => { entry.enhancement = null; closeModal(); renderArmy(); };
    body.appendChild(d);
  }
  document.getElementById('modalAdd').style.display = 'none';
  document.getElementById('overlay').classList.remove('hidden');
}

/* ---- serialization / persistence ----------------------------------- */
function serialize(){
  return {
    v: 2, faction: FACTION_KEY, name: curListName,
    detachments: detachments.slice(),
    pointsLimit: parseInt(document.getElementById('pointsLimit').value) || 0,
    nextId: nextId,
    army: army.map(a => ({
      id: a.id, unitName: a.unitName, category: a.category, models: a.models,
      basePoints: a.basePoints, points: a.points,
      wargear: a.wargear || [], enhancement: a.enhancement || null, attachedTo: a.attachedTo || null
    }))
  };
}
function applyState(s){
  if(!s || s.faction !== FACTION_KEY) return false;
  let dets = s.detachments;
  if(!dets && s.detachment) dets = [s.detachment];   // migrate v1 single detachment
  detachments = (dets || []).filter(n => getDet(n));
  army = (s.army || []).map(a => ({
    id: a.id, unitName: a.unitName, category: a.category, models: a.models,
    basePoints: a.basePoints, points: a.points,
    wargear: a.wargear || [], enhancement: a.enhancement || null, attachedTo: a.attachedTo || null,
    leaderTargets: parseLeaderTargets(UNITS.find(u => u.name === a.unitName))
  }));
  nextId = s.nextId || (army.reduce((m, a) => Math.max(m, a.id), 0) + 1);
  curListName = s.name || 'Untitled';
  document.getElementById('pointsLimit').value = s.pointsLimit || 2000;
  pruneEnhancements();
  renderDetachments();
  renderUnitList(document.getElementById('searchInput').value);
  renderArmy();
  return true;
}
function saveCurrent(){ try { localStorage.setItem(FACTION_KEY + '_current', JSON.stringify(serialize())); } catch(e){} }
function loadCurrent(){
  try { const raw = localStorage.getItem(FACTION_KEY + '_current'); if(raw) applyState(JSON.parse(raw)); } catch(e){}
}

function getLists(){ try { return JSON.parse(localStorage.getItem(FACTION_KEY + '_lists') || '{}'); } catch(e){ return {}; } }
function setLists(o){ try { localStorage.setItem(FACTION_KEY + '_lists', JSON.stringify(o)); } catch(e){} }

  renderListsContainer();

function renderListsContainer(){
  const c = document.getElementById('listsContainer');
  const lists = getLists();
  const names = Object.keys(lists).sort();
  if(names.length === 0){ c.innerHTML = '<div class="modal-note">No saved lists yet.</div>'; return; }
  c.innerHTML = '';
  names.forEach(n => {
    const L = lists[n];
    const total = (L.army || []).reduce((s, a) => s + (a.points || 0) + (a.enhancement ? a.enhancement.cost : 0), 0);
    const dets = L.detachments || (L.detachment ? [L.detachment] : []);
    const row = document.createElement('div');
    row.className = 'lists-row';
    const info = document.createElement('div');
    info.innerHTML = '<div class="unit-name">' + n + '</div><div class="unit-sub">' +
      (L.army || []).length + ' units · ' + total + ' pts' + (dets.length ? (' · ' + dets.join(', ')) : '') + '</div>';
    const btns = document.createElement('div');
    const load = document.createElement('button');
    load.className = 'tb-btn'; load.textContent = 'Load'; load.style.marginRight = '6px';
    load.onclick = () => { applyState(L); curListName = n; saveCurrent(); renderArmy(); document.getElementById('listsOverlay').classList.add('hidden'); };
    const del = document.createElement('button');
    del.className = 'tb-btn'; del.textContent = 'Delete';
    del.onclick = () => { const l = getLists(); delete l[n]; setLists(l); renderListsContainer(); };
    btns.appendChild(load); btns.appendChild(del);
    row.appendChild(info); row.appendChild(btns);
    c.appendChild(row);
  });
}
function saveCurrentList(){
  const name = (document.getElementById('listNameInput').value || '').trim();
  if(!name){ alert('Enter a name for this list.'); return; }
  curListName = name;
  const lists = getLists();
  lists[name] = serialize();
  setLists(lists);
  saveCurrent();
  renderListsContainer();
  renderArmy();
}

/* ---- share codes ---------------------------------------------------- */
function encodeArmy(){ return btoa(unescape(encodeURIComponent(JSON.stringify(serialize())))); }
function openShareModal(){
  document.getElementById('exportCode').value = encodeArmy();
  document.getElementById('importCode').value = '';
  document.getElementById('importWarn').textContent = '';
  document.getElementById('copyCodeBtn').textContent = 'Copy code';
  document.getElementById('shareOverlay').classList.remove('hidden');
}
function decodeAndImport(){
  const raw = (document.getElementById('importCode').value || '').trim();
  const warn = document.getElementById('importWarn');
  if(!raw){ warn.textContent = 'Paste a code first.'; return; }
  let s;
  try { s = JSON.parse(decodeURIComponent(escape(atob(raw)))); }
  catch(e){ warn.textContent = 'That code is not valid.'; return; }
  if(!s || s.faction !== FACTION_KEY){ warn.textContent = 'This code is for a different faction' + (s && s.faction ? (': ' + s.faction) : '') + '.'; return; }
  applyState(s);
  saveCurrent();
  document.getElementById('shareOverlay').classList.add('hidden');
}

/* ---- datasheet viewer + army-wide stat modifiers ------------------- */
// Army-wide detachment rules that change baseline characteristics (S, T, etc.).
// Only always-on, profile-level modifiers go here; conditional/text rules are shown as notes.
const DETACHMENT_EFFECTS = [];

function entryMatchesEffect(unitDef, match){
  if(!unitDef || !unitDef.datasheet) return false;
  const kws = (unitDef.datasheet.keywords||[]).map(k => k.toLowerCase());
  if(match.keyword && !kws.includes(match.keyword.toLowerCase())) return false;
  if(match.category && unitDef.category !== match.category) return false;
  if(match.names && !match.names.map(n => n.toLowerCase()).includes(unitDef.name.toLowerCase())) return false;
  return true;
}
function activeEffectsForUnit(unitDef){
  return DETACHMENT_EFFECTS.filter(ef => detachments.includes(ef.detachment) && entryMatchesEffect(unitDef, ef.match));
}

// Enhancements (from the Necrons Faction Pack) that change baseline characteristics.
// target:'bearer' = only the model with the enhancement; target:'unit' = every model in the attached bundle.
const ENHANCEMENT_EFFECTS = {};
// Effects on `member` from enhancements carried by anyone in its bundle.
function enhancementEffectsFor(member, bundle){
  const out = [];
  bundle.forEach(carrier => {
    if(!carrier.enhancement) return;
    const e = ENHANCEMENT_EFFECTS[carrier.enhancement.name];
    if(!e) return;
    const self = carrier.id === member.id;
    const mods = e.mods.filter(m => self || m.target === 'unit');
    if(mods.length) out.push({ mods, note: '★ ' + carrier.enhancement.name + (self ? '' : ' (from ' + carrier.unitName + ')') + ': ' + e.note });
  });
  return out;
}
function applyDelta(raw, mods){
  const m = String(raw).match(/^(-?\d+)(.*)$/);   // leading integer + suffix (e.g. 24")
  if(!m) return { value: raw, changed:false };
  const d = mods.reduce((s, x) => s + x.delta, 0);
  if(d === 0) return { value: raw, changed:false };
  return { value: (parseInt(m[1], 10) + d) + m[2], changed:true };
}
// Which weapons a weapon-scope mod applies to (melee vs ranged).
function wtypeMatches(mod, melee){
  if(!mod.wtype || mod.wtype === 'all') return true;
  return mod.wtype === (melee ? 'melee' : 'ranged');
}
function statGridMod(stats, effects){
  const order = ['M','T','SV','W','LD','OC'];
  const byStat = {};
  effects.forEach(ef => ef.mods.forEach(m => { if(m.scope === 'model'){ (byStat[m.stat] = byStat[m.stat] || []).push(m); } }));
  const cells = order.filter(k => stats && stats[k]).map(k => {
    let val = stats[k], cls = '';
    if(byStat[k]){ const r = applyDelta(stats[k], byStat[k]); val = r.value; cls = r.changed ? ' ds-mod' : ''; }
    return '<div class="stat-cell"><div class="stat-label">'+k+'</div><div class="stat-value'+cls+'">'+val+'</div></div>';
  }).join('');
  return '<div class="stat-grid">'+cells+'</div>';
}
function weaponTableMod(title, weapons, melee, effects){
  if(!weapons || weapons.length === 0) return '';
  const skillCol = melee ? 'WS' : 'BS';
  const wMods = {};
  effects.forEach(ef => ef.mods.forEach(m => {
    if(m.scope === 'weapon' && wtypeMatches(m, melee)){ (wMods[m.stat] = wMods[m.stat] || []).push(m); }
  }));
  const cell = (w, key) => {
    const raw = (w[key] !== undefined && w[key] !== null && w[key] !== '') ? w[key] : '-';
    if(wMods[key]){ const r = applyDelta(raw, wMods[key]); return '<span class="'+(r.changed ? 'ds-mod' : '')+'">'+r.value+'</span>'; }
    return raw;
  };
  const rows = weapons.map(w => '<tr>'+
    '<td>'+w.name+'</td>'+
    '<td>'+cell(w,'Range')+'</td>'+
    '<td>'+cell(w,'A')+'</td>'+
    '<td>'+(w[skillCol]||'-')+'</td>'+
    '<td>'+cell(w,'S')+'</td>'+
    '<td>'+cell(w,'AP')+'</td>'+
    '<td>'+cell(w,'D')+'</td>'+
    '<td>'+((w.Keywords && w.Keywords !== '-') ? w.Keywords : '–')+'</td>'+
  '</tr>').join('');
  return '<div class="section-title">'+title+'</div><table class="weapon-table">'+
    '<thead><tr><th>Weapon</th><th>Range</th><th>A</th><th>'+skillCol+'</th><th>S</th><th>AP</th><th>D</th><th>Keywords</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table>';
}
function bundleFor(entry){
  let host = entry;
  if(entry.attachedTo){ const h = army.find(a => a.id === entry.attachedTo); if(h) host = h; }
  return [host].concat(army.filter(a => a.attachedTo === host.id));
}
function memberDatasheetHTML(entry, highlightId, bundle){
  const u = unitDefOf(entry);
  if(!u || !u.datasheet) return '';
  const ds = u.datasheet;
  const detEffects = activeEffectsForUnit(u);
  const enhEffects = enhancementEffectsFor(entry, bundle || [entry]);
  const effects = detEffects.concat(enhEffects);
  let html = '<div class="ds-member">';
  html += '<div class="ds-member-name">'+(entry.id === highlightId ? '▸ ' : '')+entry.unitName+
    (entry.attachedTo ? ' <span class="attached-tag">attached</span>' : '')+'</div>';
  if(entry.enhancement && !ENHANCEMENT_EFFECTS[entry.enhancement.name]){
    html += '<div class="ds-section-note">★ Enhancement: '+entry.enhancement.name+' (+'+entry.enhancement.cost+' pts)'+
      (entry.enhancement.upgrade ? ' [Upgrade]' : '')+' — see your detachment rules for its effect.</div>';
  }
  html += statGridMod(ds.stats || {}, effects);
  html += keywordChips(ds.keywords);
  detEffects.forEach(ef => { html += '<div class="ds-section-note">⚙ '+ef.note+'</div>'; });
  enhEffects.forEach(ef => { html += '<div class="ds-section-note">'+ef.note+'</div>'; });
  html += abilitiesBlock(ds.abilities);
  html += weaponTableMod('Ranged Weapons', ds.rangedWeapons, false, effects);
  html += weaponTableMod('Melee Weapons', ds.meleeWeapons, true, effects);
  html += '</div>';
  return html;
}
function openDatasheet(entry){
  const members = bundleFor(entry);
  document.getElementById('modalCat').textContent = members.length > 1 ? 'Combined Unit · Datasheet' : 'Datasheet';
  document.getElementById('modalName').textContent = entry.unitName;
  let html = '';
  const dets = selectedDets();
  if(dets.length){
    html += '<div class="ds-ctx">Active detachments: '+dets.map(d => d.name+' ('+d.disp+')').join(' · ')+
      '. Stat changes from army-wide rules are shown in <span class="ds-mod">green</span>.</div>';
  }
  if(members.length > 1){
    html += '<div class="ds-ctx">Fielded together: '+members.map(m => m.unitName).join(' + ')+
      '. Attached Leaders/Support add their abilities to the unit.</div>';
  }
  members.forEach(m => { html += memberDatasheetHTML(m, entry.id, members); });
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalAdd').style.display = 'none';
  document.getElementById('overlay').classList.remove('hidden');
}

document.getElementById('shareOverlay').addEventListener('click', e => { if(e.target.id === 'shareOverlay') document.getElementById('shareOverlay').classList.add('hidden'); });

renderUnitList(document.getElementById('searchInput').value);
