<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Eaters Army Builder</title>
<style>
  :root {
    --bg: #0b0f0a;
    --panel: #11160f;
    --panel2: #161d12;
    --border: #2d3b22;
    --green: #6fdc3a;
    --green-dim: #3a8a1f;
    --text: #d8e6c8;
    --text-dim: #8aa074;
    --gold: #c9a93f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  header {
    padding: 18px 24px;
    border-bottom: 2px solid var(--green-dim);
    background: linear-gradient(180deg, #141a10, #0b0f0a);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
  }
  header .faction-tag {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .points-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
  }
  .points-box label { font-size: 12px; color: var(--text-dim); }
  .points-box input[type=number] {
    width: 70px;
    background: #0b0f0a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 14px;
  }
  .points-total {
    font-size: 18px;
    font-weight: bold;
  }
  .points-total.over { color: #e25a3a; }
  .points-total.ok { color: var(--green); }
  main {
    display: flex;
    gap: 16px;
    padding: 16px;
    align-items: flex-start;
  }
  .col {
    flex: 1;
    min-width: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-header {
    background: var(--panel2);
    padding: 10px 14px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
    border-bottom: 1px solid var(--border);
  }
  .search-bar {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .search-bar input {
    width: 100%;
    padding: 7px 10px;
    background: #0b0f0a;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 13px;
  }
  .category {
    border-bottom: 1px solid var(--border);
  }
  .category-title {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: bold;
    color: var(--green);
    background: #0e1310;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
  }
  .category-title:hover { background: #15200f; }
  .category-body { display: block; }
  .category.collapsed .category-body { display: none; }
  .category-title .arrow { color: var(--text-dim); font-size: 11px; }
  .unit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    border-bottom: 1px solid #1a2215;
    gap: 8px;
    cursor: pointer;
  }
  .unit-row:hover { background: #131a0e; }
  .unit-row:last-child { border-bottom: none; }
  .unit-row.maxed { opacity: 0.45; cursor: default; }
  .unit-row.maxed:hover { background: none; }
  .unit-info { flex: 1; min-width: 0; }
  .unit-name { font-size: 13px; color: var(--text); }
  .unit-sub { font-size: 11px; color: var(--text-dim); }
  .unit-pts { font-size: 12px; color: var(--gold); white-space: nowrap; }
  .unit-count {
    font-size: 11px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    white-space: nowrap;
  }
  .unit-count.full { color: #e25a3a; border-color: #5a1f1f; }
  .army-list { min-height: 200px; }
  .army-empty {
    padding: 30px 14px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }
  .army-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid #1a2215;
    gap: 8px;
  }
  .army-row .unit-info { flex: 1; }
  .army-row .cat-badge {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .remove-btn {
    background: #3a1414;
    color: #e0a0a0;
    border: none;
    border-radius: 4px;
    width: 26px;
    height: 26px;
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
  }
  .remove-btn:hover { background: #5a1f1f; }
  .wargear-btn {
    background: #1a2b14;
    color: var(--green);
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    width: 26px;
    height: 26px;
    font-size: 13px;
    cursor: pointer;
    line-height: 1;
  }
  .wargear-btn:hover { background: #233a1a; }
  .army-footer {
    padding: 14px;
    border-top: 2px solid var(--border);
    background: var(--panel2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .army-footer .label { font-size: 13px; color: var(--text-dim); }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .clear-btn:hover { color: #e0a0a0; border-color: #5a1f1f; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .scroll { max-height: 640px; overflow-y: auto; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--green-dim);
    border-radius: 8px;
    width: 560px;
    max-width: 92vw;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .modal-body { overflow-y: auto; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .stat-cell {
    background: #0b0f0a;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-align: center;
    padding: 6px 2px;
  }
  .stat-cell .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
  .stat-cell .stat-value { font-size: 15px; color: var(--green); font-weight: bold; }
  .keyword-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    font-size: 10px;
    color: var(--gold);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .section-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 14px 0 6px;
  }
  .ability-item { margin-bottom: 8px; }
  .ability-item .ability-name { font-size: 12px; color: var(--text); font-weight: bold; }
  .ability-item .ability-text { font-size: 11px; color: var(--text-dim); line-height: 1.4; white-space: pre-line; }
  .weapon-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 6px; }
  .weapon-table th, .weapon-table td { border: 1px solid var(--border); padding: 4px 6px; text-align: center; }
  .weapon-table th { background: #0e1310; color: var(--gold); font-size: 10px; text-transform: uppercase; }
  .weapon-table td:first-child, .weapon-table th:first-child { text-align: left; color: var(--text); }
  .weapon-table td { color: var(--text-dim); }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel2);
    border-radius: 8px 8px 0 0;
  }
  .modal-header h2 {
    margin: 0;
    font-size: 16px;
    color: var(--green);
  }
  .modal-header .modal-cat { font-size: 11px; color: var(--gold); text-transform: uppercase; }
  .modal-body { padding: 16px 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-field select {
    width: 100%;
    padding: 8px;
    background: #0b0f0a;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 13px;
  }
  .modal-price {
    font-size: 22px;
    color: var(--gold);
    font-weight: bold;
  }
  .modal-note {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .modal-warn {
    font-size: 12px;
    color: #e25a3a;
    margin-top: 8px;
  }
  .modal-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }
  .btn:hover { color: var(--text); }
  .btn-primary {
    background: var(--green-dim);
    border-color: var(--green-dim);
    color: #0b0f0a;
    font-weight: bold;
  }
  .btn-primary:hover { background: var(--green); }
  .btn-primary:disabled {
    background: #2d3b22;
    color: #6a7a5e;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>40K Pts on the Cheap</h1>
    <a class="back-link" href="index.html" style="font-size:11px;color:#8aa074;text-decoration:none;">&larr; Choose a different faction</a>
    <div class="faction-tag">FACTION: WORLD EATERS</div>
  </div>
  <div class="points-box">
    <label>Points limit</label>
    <input type="number" id="pointsLimit" value="2000" min="0" step="5">
    <div class="points-total ok" id="totalDisplay">0 / 2000</div>
  </div>
</header>

<main>
  <div class="col">
    <div class="panel">
      <div class="panel-header">Available Units</div>
      <div class="search-bar"><input type="text" id="searchInput" placeholder="Search units..."></div>
      <div class="scroll" id="unitList"></div>
    </div>
  </div>

  <div class="col">
    <div class="panel">
      <div class="panel-header">Your Army List</div>
      <div class="scroll army-list" id="armyList">
        <div class="army-empty">No units added yet. Click a unit to add it.</div>
      </div>
      <div class="army-footer">
        <span class="label" id="unitCount">0 units</span>
        <button class="clear-btn" id="clearBtn">Clear army</button>
      </div>
    </div>
  </div>
</main>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-cat" id="modalCat"></div>
      <h2 id="modalName"></h2>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalAdd">Add to Army</button>
    </div>
  </div>
</div>

": "-2", "D": "2", "Keywords": "-"}]}}];
const CATEGORY_ORDER = ["Characters", "Battleline", "Infantry", "Mounted", "Beasts", "Vehicles", "Aircraft"];
const MAX_COPIES = 3;

let army = [];          // { id, unitName, category, models, points, copyIndex }
let nextId = 1;
let activeUnit = null;  // unit currently open in modal

function countInArmy(unitName) {
  return army.filter(a => a.unitName === unitName).length;
}

function maxAllowed(unit) {
  return unit.epicHero ? 1 : MAX_COPIES;
}

function priceFor(size, copyIndexZeroBased) {
  // copyIndexZeroBased: 0 = first copy already in army count before this add
  if (size.flat !== null && size.flat !== undefined) return size.flat;
  return copyIndexZeroBased < 2 ? size.p1_2 : size.p3;
}

function unitPriceRangeLabel(unit) {
  const prices = [];
  unit.sizes.forEach(s => {
    if (s.flat !== null && s.flat !== undefined) prices.push(s.flat);
    if (s.p1_2 !== null && s.p1_2 !== undefined) prices.push(s.p1_2);
  });
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  return min === max ? (min + ' pts') : (min + '\u2013' + max + ' pts');
}

function groupByCategory(list) {
  const groups = {};
  list.forEach(u => {
    if (!groups[u.category]) groups[u.category] = [];
    groups[u.category].push(u);
  });
  return groups;
}

function renderUnitList(filterText) {
  const container = document.getElementById('unitList');
  container.innerHTML = "";
  const filtered = filterText
    ? UNITS.filter(u => u.name.toLowerCase().includes(filterText.toLowerCase()))
    : UNITS;
  const groups = groupByCategory(filtered);
  CATEGORY_ORDER.forEach(cat => {
    if (!groups[cat] || groups[cat].length === 0) return;
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    const title = document.createElement('div');
    title.className = 'category-title';
    title.innerHTML = '<span>' + cat + ' (' + groups[cat].length + ')</span><span class="arrow">\u25be</span>';
    title.onclick = () => {
      catDiv.classList.toggle('collapsed');
      title.querySelector('.arrow').textContent = catDiv.classList.contains('collapsed') ? '\u25b8' : '\u25be';
    };
    const body = document.createElement('div');
    body.className = 'category-body';
    groups[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(u => {
      const have = countInArmy(u.name);
      const max = maxAllowed(u);
      const maxed = have >= max;
      const row = document.createElement('div');
      row.className = 'unit-row' + (maxed ? ' maxed' : '');
      row.innerHTML = `
        <div class="unit-info">
          <div class="unit-name">${u.name}${u.epicHero ? ' \u2605' : ''}</div>
          <div class="unit-sub">${unitPriceRangeLabel(u)}</div>
        </div>
        <div class="unit-count ${maxed ? 'full' : ''}">${have}/${max}</div>
      `;
      if (!maxed) row.onclick = () => openModal(u);
      body.appendChild(row);
    });
    catDiv.appendChild(title);
    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });
}

function statGrid(stats) {
  const order = ['M','T','SV','W','LD','OC'];
  const cells = order.filter(k => stats[k]).map(k =>
    `<div class="stat-cell"><div class="stat-label">${k}</div><div class="stat-value">${stats[k]}</div></div>`
  ).join('');
  return `<div class="stat-grid">${cells}</div>`;
}

function keywordChips(keywords) {
  if (!keywords || keywords.length === 0) return '';
  return '<div class="keyword-chips">' + keywords.map(k => `<span class="chip">${k}</span>`).join('') + '</div>';
}

function abilitiesBlock(abilities) {
  if (!abilities || abilities.length === 0) return '';
  const items = abilities.map(a =>
    `<div class="ability-item"><div class="ability-name">${a.name}</div><div class="ability-text">${a.text}</div></div>`
  ).join('');
  return `<div class="section-title">Abilities</div>${items}`;
}

function weaponTable(title, weapons, melee) {
  if (!weapons || weapons.length === 0) return '';
  const skillCol = melee ? 'WS' : 'BS';
  const rows = weapons.map(w => `
    <tr>
      <td>${w.name}</td>
      <td>${w.Range || '-'}</td>
      <td>${w.A || '-'}</td>
      <td>${w[skillCol] || '-'}</td>
      <td>${w.S || '-'}</td>
      <td>${w.AP || '-'}</td>
      <td>${w.D || '-'}</td>
      <td>${(w.Keywords && w.Keywords !== '-') ? w.Keywords : '\u2013'}</td>
    </tr>`).join('');
  return `
    <div class="section-title">${title}</div>
    <table class="weapon-table">
      <thead><tr><th>Weapon</th><th>Range</th><th>A</th><th>${skillCol}</th><th>S</th><th>AP</th><th>D</th><th>Keywords</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function openModal(unit) {
  activeUnit = unit;
  document.getElementById('modalCat').textContent = unit.category + (unit.epicHero ? ' \u00b7 Epic Hero (max 1)' : ' \u00b7 max 3 per army');
  document.getElementById('modalName').textContent = unit.name;
  const body = document.getElementById('modalBody');
  body.innerHTML = "";

  const ds = unit.datasheet;
  if (ds) {
    const dsWrap = document.createElement('div');
    dsWrap.innerHTML =
      statGrid(ds.stats || {}) +
      keywordChips(ds.keywords) +
      abilitiesBlock(ds.abilities) +
      weaponTable('Ranged Weapons', ds.rangedWeapons, false) +
      weaponTable('Melee Weapons', ds.meleeWeapons, true);
    body.appendChild(dsWrap);
  }

  const have = countInArmy(unit.name);
  const copyIndex = have; // 0-based index of the copy about to be added

  let sizeSelect = null;
  if (unit.sizes.length > 1) {
    const field = document.createElement('div');
    field.className = 'modal-field';
    field.innerHTML = '<label>Unit size</label>';
    sizeSelect = document.createElement('select');
    unit.sizes.forEach((s, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = s.models + (s.models === '1' ? ' model' : ' models');
      sizeSelect.appendChild(opt);
    });
    field.appendChild(sizeSelect);
    body.appendChild(field);
  }

  const priceField = document.createElement('div');
  priceField.className = 'modal-field';
  priceField.innerHTML = '<label>Cost</label><div class="modal-price" id="modalPrice"></div><div class="modal-note" id="modalNote"></div>';
  body.appendChild(priceField);

  function updatePrice() {
    const sizeIdx = sizeSelect ? parseInt(sizeSelect.value) : 0;
    const size = unit.sizes[sizeIdx];
    const price = priceFor(size, copyIndex);
    document.getElementById('modalPrice').textContent = price + ' pts';
    const note = document.getElementById('modalNote');
    if (size.flat === null || size.flat === undefined) {
      note.textContent = copyIndex < 2
        ? 'Price for the 1st or 2nd copy of this unit in your army.'
        : 'Price increases for the 3rd copy of this unit in your army.';
    } else {
      note.textContent = '';
    }
  }
  if (sizeSelect) sizeSelect.onchange = updatePrice;
  updatePrice();

  const warn = document.createElement('div');
  warn.className = 'modal-warn';
  warn.id = 'modalWarn';
  if (have > 0) {
    warn.textContent = 'You already have ' + have + ' of this unit in your army.';
  }
  body.appendChild(warn);

  document.getElementById('modalAdd').textContent = 'Add to Army';
  document.getElementById('modalAdd').onclick = () => {
    const sizeIdx = sizeSelect ? parseInt(sizeSelect.value) : 0;
    const size = unit.sizes[sizeIdx];
    const price = priceFor(size, copyIndex);
    army.push({
      id: nextId++,
      unitName: unit.name,
      category: unit.category,
      models: size.models,
      basePoints: price,
      points: price,
      wargear: [],
    });
    closeModal();
    renderUnitList(document.getElementById('searchInput').value);
    renderArmy();
  };

  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  activeUnit = null;
}

function openWargearModal(entry) {
  const unit = UNITS.find(u => u.name === entry.unitName);
  if (!unit || !unit.wargear || unit.wargear.length === 0) return;
  document.getElementById('modalCat').textContent = 'Wargear Options';
  document.getElementById('modalName').textContent = entry.unitName;
  const body = document.getElementById('modalBody');
  body.innerHTML = "";

  const note = document.createElement('div');
  note.className = 'modal-note';
  note.textContent = 'Choose optional wargear for this unit.';
  body.appendChild(note);

  const wgInputs = [];
  unit.wargear.forEach((wg) => {
    const existing = (entry.wargear || []).find(w => w.name === wg.name);
    const row = document.createElement('div');
    row.className = 'wargear-row';
    row.style.display = 'flex';
    row.style.alignItems = 'center';
    row.style.justifyContent = 'space-between';
    row.style.gap = '10px';
    row.style.margin = '10px 0';
    const label = document.createElement('span');
    label.textContent = wg.name + ' (+' + wg.cost + ' pts each)';
    const input = document.createElement('input');
    input.type = 'number';
    input.min = '0';
    input.value = existing ? existing.qty : 0;
    input.style.width = '60px';
    row.appendChild(label);
    row.appendChild(input);
    body.appendChild(row);
    wgInputs.push(input);
  });

  const priceField = document.createElement('div');
  priceField.className = 'modal-field';
  priceField.innerHTML = '<label>Total Cost</label><div class="modal-price" id="modalPrice"></div>';
  body.appendChild(priceField);

  function updateWgPrice() {
    let sum = 0;
    wgInputs.forEach((inp, i) => { sum += Math.max(0, parseInt(inp.value) || 0) * unit.wargear[i].cost; });
    document.getElementById('modalPrice').textContent = (entry.basePoints + sum) + ' pts';
  }
  wgInputs.forEach(inp => inp.addEventListener('input', updateWgPrice));
  updateWgPrice();

  const warn = document.createElement('div');
  warn.className = 'modal-warn';
  warn.id = 'modalWarn';
  body.appendChild(warn);

  document.getElementById('modalAdd').textContent = 'Save Wargear';
  document.getElementById('modalAdd').onclick = () => {
    const chosen = unit.wargear.map((wg, i) => ({
      name: wg.name,
      qty: Math.max(0, parseInt(wgInputs[i].value) || 0),
      cost: wg.cost,
    })).filter(w => w.qty > 0);
    const wgSum = chosen.reduce((s, w) => s + w.qty * w.cost, 0);
    entry.wargear = chosen;
    entry.points = entry.basePoints + wgSum;
    document.getElementById('modalAdd').textContent = 'Add to Army';
    closeModal();
    renderArmy();
  };

  document.getElementById('overlay').classList.remove('hidden');
}

function removeFromArmy(id) {
  army = army.filter(a => a.id !== id);
  renderArmy();
  renderUnitList(document.getElementById('searchInput').value);
}

function renderArmy() {
  const container = document.getElementById('armyList');
  const countEl = document.getElementById('unitCount');
  if (army.length === 0) {
    container.innerHTML = '<div class="army-empty">No units added yet. Click a unit to add it.</div>';
  } else {
    container.innerHTML = "";
    army.forEach(a => {
      const row = document.createElement('div');
      row.className = 'army-row';
      const unitDef = UNITS.find(u => u.name === a.unitName);
      const hasWargear = unitDef && unitDef.wargear && unitDef.wargear.length > 0;
      const wgLine = (a.wargear && a.wargear.length > 0)
        ? '<div class="cat-badge">' + a.wargear.map(w => '+' + w.qty + ' ' + w.name).join(', ') + '</div>'
        : '';
      row.innerHTML = `
        <div class="unit-info">
          <div class="unit-name">${a.unitName}</div>
          <div class="cat-badge">${a.category} \u00b7 ${a.models} ${a.models === '1' ? 'model' : 'models'}</div>
          ${wgLine}
        </div>
        <div class="unit-pts">${a.points} pts</div>
        ${hasWargear ? '<button class="wargear-btn" title="Wargear options">\u2699</button>' : ''}
        <button class="remove-btn" title="Remove">\u2715</button>
      `;
      if (hasWargear) row.querySelector('.wargear-btn').onclick = () => openWargearModal(a);
      row.querySelector('.remove-btn').onclick = () => removeFromArmy(a.id);
      container.appendChild(row);
    });
  }
  countEl.textContent = army.length + (army.length === 1 ? ' unit' : ' units');
  updateTotal();
}

function updateTotal() {
  const total = army.reduce((sum, a) => sum + a.points, 0);
  const limit = parseInt(document.getElementById('pointsLimit').value) || 0;
  const totalEl = document.getElementById('totalDisplay');
  totalEl.textContent = total + ' / ' + limit;
  totalEl.className = 'points-total ' + (total > limit ? 'over' : 'ok');
}

document.getElementById('searchInput').addEventListener('input', e => renderUnitList(e.target.value));
document.getElementById('pointsLimit').addEventListener('input', updateTotal);
document.getElementById('clearBtn').addEventListener('click', () => { army = []; renderArmy(); renderUnitList(document.getElementById('searchInput').value); });
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });

renderUnitList('');
renderArmy();
</script>
</body>
</html>
